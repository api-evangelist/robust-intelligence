description: Robust Intelligence is an AI security company founded in 2019 to defend ML and GenAI systems against adversarial
  attacks, data poisoning, prompt injection, and unsafe outputs. Its platform combined automated red teaming (Algorithmic
  AI Red Teaming) with runtime protection (AI Firewall) for LLM and traditional ML applications. Cisco announced the acquisition
  of Robust Intelligence in August 2024 and the technology now powers the Cisco AI Defense product line, with Robust Intelligence's
  capabilities integrated into Cisco's broader security portfolio.
